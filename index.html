<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MotoRoute – Touren planen</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
  <style>
    :root {
      --bg: #0d0d10; --surface: #16161a; --surface2: #1e1e25; --border: #2a2a35;
      --accent: #f07800; --accent-dark: #b85c00; --text: #eeebe4; --muted: #7a7880;
      --success: #3dba7b; --danger: #e04444; --radius: 8px;
      --font-display: 'Bebas Neue', sans-serif; --font-body: 'DM Sans', sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font-body); font-size: 15px; line-height: 1.6; }
    #app { min-height: 100vh; }
    ::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-track { background: var(--bg); } ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* NAV */
    .nav { display: flex; align-items: center; justify-content: space-between; padding: 0 28px; height: 62px; background: var(--surface); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
    .nav-logo { font-family: var(--font-display); font-size: 30px; letter-spacing: 2px; color: var(--accent); cursor: pointer; user-select: none; }
    .nav-logo span { color: var(--text); }
    .nav-user { display: flex; align-items: center; gap: 12px; font-size: 13px; color: var(--muted); }
    .nav-user strong { color: var(--text); }

    /* BUTTONS */
    .btn { display: inline-flex; align-items: center; gap: 7px; padding: 10px 20px; border-radius: var(--radius); font-family: var(--font-body); font-size: 14px; font-weight: 500; cursor: pointer; border: none; transition: all 0.15s; white-space: nowrap; }
    .btn-primary { background: var(--accent); color: #000; }
    .btn-primary:hover { background: #d96d00; }
    .btn-primary:disabled { opacity: 0.5; cursor: default; }
    .btn-ghost { background: transparent; color: var(--muted); border: 1px solid var(--border); }
    .btn-ghost:hover { color: var(--text); border-color: var(--muted); }
    .btn-sm { padding: 7px 14px; font-size: 13px; }
    .btn-danger { background: var(--danger); color: #fff; border: none; }
    .btn-logout { background: transparent; border: 1px solid var(--border); color: var(--muted); font-size: 12px; padding: 6px 12px; border-radius: var(--radius); cursor: pointer; transition: all .15s; font-family: var(--font-body); }
    .btn-logout:hover { border-color: var(--danger); color: var(--danger); }

    /* FORMS */
    .form-group { margin-bottom: 18px; }
    label { display: block; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.09em; color: var(--muted); margin-bottom: 7px; }
    input, textarea, select { width: 100%; padding: 11px 14px; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text); font-family: var(--font-body); font-size: 15px; transition: border-color 0.15s; outline: none; }
    input:focus, textarea:focus, select:focus { border-color: var(--accent); }
    textarea { min-height: 90px; resize: vertical; }
    input[type="date"] { color-scheme: dark; }
    select option { background: var(--surface2); }

    /* AUTH */
    .auth-screen { min-height: 100vh; display: grid; grid-template-columns: 1fr 480px; }
    @media (max-width: 800px) { .auth-screen { grid-template-columns: 1fr; } .auth-branding { display: none; } }
    .auth-branding { background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; justify-content: center; padding: 60px; position: relative; overflow: hidden; }
    .auth-branding::before { content: ''; position: absolute; top: -100px; right: -100px; width: 400px; height: 400px; border-radius: 50%; background: radial-gradient(circle, rgba(240,120,0,0.12) 0%, transparent 70%); pointer-events: none; }
    .auth-branding-logo { font-family: var(--font-display); font-size: 72px; letter-spacing: 4px; color: var(--accent); line-height: 1; margin-bottom: 8px; }
    .auth-branding-logo span { color: var(--text); }
    .auth-branding-tagline { font-size: 16px; color: var(--muted); margin-bottom: 48px; }
    .auth-feature { display: flex; align-items: flex-start; gap: 14px; margin-bottom: 20px; }
    .auth-feature-icon { font-size: 22px; margin-top: 2px; }
    .auth-feature-text strong { display: block; color: var(--text); font-weight: 500; }
    .auth-feature-text span { font-size: 13px; color: var(--muted); }
    .auth-form-panel { display: flex; align-items: center; justify-content: center; padding: 40px 28px; background: var(--bg); }
    .auth-form-box { width: 100%; max-width: 380px; }
    .auth-form-title { font-family: var(--font-display); font-size: 38px; letter-spacing: 2px; margin-bottom: 6px; }
    .auth-form-sub { color: var(--muted); font-size: 13px; margin-bottom: 32px; }
    .auth-toggle { margin-top: 20px; text-align: center; font-size: 13px; color: var(--muted); }
    .auth-toggle a { color: var(--accent); cursor: pointer; text-decoration: none; font-weight: 500; }
    .auth-toggle a:hover { text-decoration: underline; }
    .auth-err { background: rgba(224,68,68,0.12); border: 1px solid rgba(224,68,68,0.3); border-radius: var(--radius); padding: 10px 14px; font-size: 13px; color: #f47; margin-bottom: 16px; }

    /* CARDS */
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; transition: border-color 0.2s, transform 0.18s; }
    .card:hover { border-color: var(--accent); transform: translateY(-3px); }
    .tag { display: inline-flex; align-items: center; gap: 4px; padding: 3px 10px; border-radius: 100px; font-size: 12px; font-weight: 500; }
    .tag-accent { background: rgba(240,120,0,0.15); color: var(--accent); }
    .tag-muted { background: var(--surface2); color: var(--muted); }

    /* HOME */
    .home-layout { display: grid; grid-template-columns: 1fr 320px; gap: 28px; padding: 36px 28px; max-width: 1280px; margin: 0 auto; }
    @media (max-width: 960px) { .home-layout { grid-template-columns: 1fr; } }
    .section-header { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 20px; }
    .section-title { font-family: var(--font-display); font-size: 34px; letter-spacing: 1.5px; }
    .section-title-sm { font-family: var(--font-display); font-size: 22px; letter-spacing: 1px; }
    .tour-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
    .tour-card { cursor: pointer; }
    .tour-card-stripe { height: 4px; background: linear-gradient(90deg, var(--accent), var(--accent-dark)); }
    .tour-card-header { padding: 18px 22px 0; }
    .tour-card-name { font-family: var(--font-display); font-size: 26px; letter-spacing: 0.5px; margin: 6px 0 10px; line-height: 1.1; }
    .tour-card-meta { font-size: 13px; color: var(--muted); display: flex; flex-direction: column; gap: 5px; }
    .tour-card-meta span { display: flex; align-items: center; gap: 7px; }
    .tour-card-footer { display: flex; align-items: center; justify-content: space-between; padding: 12px 22px; border-top: 1px solid var(--border); background: var(--surface2); margin-top: 18px; }

    /* CALENDAR */
    .calendar-widget { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px; }
    .cal-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
    .cal-title { font-family: var(--font-display); font-size: 22px; letter-spacing: 1px; }
    .cal-nav-btn { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 20px; padding: 2px 8px; border-radius: 4px; transition: color 0.15s; line-height: 1; }
    .cal-nav-btn:hover { color: var(--accent); }
    .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; text-align: center; }
    .cal-dow { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); padding: 4px 0; }
    .cal-day { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; border-radius: 6px; font-size: 13px; position: relative; transition: background 0.1s; }
    .cal-day.other-month { color: var(--border); }
    .cal-day.today { font-weight: 700; color: var(--accent); }
    .cal-day.has-tour { background: rgba(240,120,0,0.18); color: var(--accent); font-weight: 600; }
    .cal-day.has-tour::after { content: ''; position: absolute; bottom: 3px; left: 50%; transform: translateX(-50%); width: 4px; height: 4px; border-radius: 50%; background: var(--accent); }
    .cal-legend { margin-top: 12px; display: flex; gap: 14px; font-size: 11px; color: var(--muted); flex-wrap: wrap; }
    .cal-legend-dot { width: 10px; height: 10px; border-radius: 2px; display: inline-block; }

    /* TOUR DETAIL */
    .tour-detail { display: flex; flex-direction: column; height: calc(100vh - 62px); }
    .tour-detail-header { padding: 16px 28px; border-bottom: 1px solid var(--border); background: var(--surface); display: flex; align-items: center; gap: 14px; flex-wrap: wrap; }
    .tour-detail-title { font-family: var(--font-display); font-size: 32px; letter-spacing: 1px; }
    .tour-tabs { display: flex; gap: 2px; padding: 0 20px; background: var(--surface); border-bottom: 1px solid var(--border); overflow-x: auto; }
    .tab-btn { padding: 12px 22px; background: none; border: none; border-bottom: 2px solid transparent; color: var(--muted); font-family: var(--font-body); font-size: 14px; font-weight: 500; cursor: pointer; transition: all 0.15s; white-space: nowrap; }
    .tab-btn:hover { color: var(--text); }
    .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
    .tab-content { flex: 1; overflow: hidden; position: relative; }
    .tab-scroll { height: 100%; overflow-y: auto; }

    /* MAP */
    #map-container { height: 100%; position: relative; }
    #map { height: 100%; }
    .map-controls { position: absolute; top: 14px; right: 14px; z-index: 1000; display: flex; flex-direction: column; gap: 8px; }
    .map-btn { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 9px 15px; color: var(--text); font-family: var(--font-body); font-size: 13px; cursor: pointer; display: flex; align-items: center; gap: 8px; transition: all 0.15s; white-space: nowrap; box-shadow: 0 2px 8px rgba(0,0,0,0.4); }
    .map-btn:hover { background: var(--surface2); border-color: var(--accent); }
    .map-btn-danger { color: var(--danger); }
    .map-info { position: absolute; bottom: 0; left: 0; right: 0; background: rgba(13,13,16,0.92); border-top: 1px solid var(--border); padding: 10px 18px; display: flex; gap: 24px; font-size: 13px; color: var(--muted); z-index: 1000; flex-wrap: wrap; }
    .map-info span { display: flex; align-items: center; gap: 6px; }
    .map-info strong { color: var(--text); }

    /* CHAT */
    .chat-layout { display: flex; flex-direction: column; height: 100%; }
    .chat-messages { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 14px; }
    .chat-msg { display: flex; flex-direction: column; max-width: 72%; }
    .chat-msg.mine { align-self: flex-end; align-items: flex-end; }
    .chat-bubble { padding: 10px 16px; border-radius: 14px; font-size: 14px; line-height: 1.5; word-break: break-word; }
    .chat-msg.mine .chat-bubble { background: var(--accent); color: #000; border-bottom-right-radius: 4px; }
    .chat-msg:not(.mine) .chat-bubble { background: var(--surface2); border-bottom-left-radius: 4px; }
    .chat-meta { font-size: 11px; color: var(--muted); margin-top: 4px; }
    .chat-input-bar { padding: 14px 20px; border-top: 1px solid var(--border); display: flex; gap: 10px; background: var(--surface); }
    .chat-input-bar input { flex: 1; }

    /* PARTICIPANTS */
    .participants-layout { padding: 28px; max-width: 600px; }
    .participant-item { display: flex; align-items: center; gap: 14px; padding: 14px 16px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 8px; }
    .participant-avatar { width: 42px; height: 42px; border-radius: 50%; background: var(--accent); color: #000; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 17px; flex-shrink: 0; }

    /* INFO */
    .info-layout { padding: 28px; }
    .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 28px; }
    @media (max-width: 720px) { .info-grid { grid-template-columns: 1fr; } }
    .info-block { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 18px; }
    .info-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); margin-bottom: 5px; }
    .plan-date-item { display: flex; align-items: center; justify-content: space-between; padding: 10px 14px; background: var(--surface2); border-radius: var(--radius); margin-bottom: 6px; font-size: 13px; }

    /* PAGE FORM */
    .page-form { max-width: 660px; margin: 40px auto; padding: 0 28px 60px; }
    .page-title { font-family: var(--font-display); font-size: 48px; letter-spacing: 2px; margin-bottom: 6px; }
    .page-sub { color: var(--muted); margin-bottom: 32px; font-size: 14px; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .divider { height: 1px; background: var(--border); margin: 22px 0; }

    /* EMPTY */
    .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; padding: 64px 20px; text-align: center; color: var(--muted); }
    .empty-icon { font-size: 52px; opacity: 0.35; }
    .empty-title { font-family: var(--font-display); font-size: 26px; color: var(--text); letter-spacing: 1px; }
    .empty-sub { font-size: 14px; max-width: 300px; }

    /* SPINNER */
    .spinner { display: inline-block; width: 18px; height: 18px; border: 2px solid rgba(255,255,255,0.2); border-top-color: #fff; border-radius: 50%; animation: spin 0.7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-screen { display: flex; align-items: center; justify-content: center; height: 100vh; font-family: var(--font-display); font-size: 36px; letter-spacing: 3px; color: var(--accent); opacity: 0.7; }
    .page-loading { display: flex; align-items: center; justify-content: center; gap: 12px; padding: 80px; color: var(--muted); font-size: 14px; }

    /* TOAST */
    .toast { position: fixed; bottom: 24px; right: 24px; background: var(--surface); border: 1px solid var(--border); border-left: 3px solid var(--accent); border-radius: var(--radius); padding: 14px 20px; font-size: 14px; z-index: 9999; animation: slide-up 0.3s ease; max-width: 340px; box-shadow: 0 8px 24px rgba(0,0,0,0.4); }
    .toast.error { border-left-color: var(--danger); }
    @keyframes slide-up { from { opacity: 0; transform: translateY(24px); } to { opacity: 1; transform: translateY(0); } }

    /* Leaflet dark */
    .leaflet-container { background: #1a1a20; }
    .leaflet-popup-content-wrapper { background: var(--surface); color: var(--text); border: 1px solid var(--border); border-radius: var(--radius); }
    .leaflet-popup-tip { background: var(--surface); }
  </style>
</head>
<body>
<div id="app"><div class="loading-screen">MOTOROUTE…</div></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
// ==================== SUPABASE ====================
const { createClient } = window.supabase;
const sb = createClient(
  'https://kkoeeyqxubtcqvonckss.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imtrb2VleXF4dWJ0Y3F2b25ja3NzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ2MjU4NjAsImV4cCI6MjA5MDIwMTg2MH0.tBW2YV-FeLP9BXIBwjBfybuAd4ZET0uZ3rIOsI2iXT4'
);

// ==================== STATE ====================
const state = {
  view: 'loading',
  authMode: 'login',
  authErr: '',
  currentUser: null,     // { id, username }
  tours: [],             // all tours from DB
  myTourIds: new Set(),  // tours where user is admin or member
  profileCache: {},      // userId -> username
  currentTourId: null,
  currentTab: 'map',
  currentTour: null,
  tourMembers: [],
  tourMessages: [],
  tourPlanDates: [],
  calMonth: new Date(),
  tourCalMonth: new Date(),
  preJoinId: null,
};

// ==================== MAP VARS ====================
let mapInstance = null, gpxLayer = null, startMarker = null, endMarker = null;

// ==================== UTILS ====================
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function toast(msg, type='') {
  const el = document.createElement('div');
  el.className = 'toast' + (type ? ' '+type : '');
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 3200);
}
function daysInMonth(y, m) { return new Date(y, m+1, 0).getDate(); }
function usernameToEmail(u) {
  return u.toLowerCase().replace(/[^a-z0-9_.-]/g,'_') + '@motoroute.app';
}
function setBtn(id, loading, label) {
  const btn = document.getElementById(id);
  if (!btn) return;
  btn.disabled = loading;
  btn.innerHTML = loading ? '<span class="spinner"></span>' : label;
}

// ==================== AUTH ====================
async function doRegister() {
  const username = (document.getElementById('a-name')?.value || '').trim();
  const pw = document.getElementById('a-pw')?.value || '';
  const pw2 = document.getElementById('a-pw2')?.value || '';
  state.authErr = '';

  if (!username || username.length < 2) { state.authErr = 'Benutzername muss mindestens 2 Zeichen haben.'; render(); return; }
  if (!/^[a-zA-Z0-9_.-]+$/.test(username)) { state.authErr = 'Nur Buchstaben, Zahlen, _, . und - erlaubt.'; render(); return; }
  if (!pw || pw.length < 6) { state.authErr = 'Passwort muss mindestens 6 Zeichen haben.'; render(); return; }
  if (pw !== pw2) { state.authErr = 'Passwörter stimmen nicht überein.'; render(); return; }

  setBtn('auth-btn', true, '');
  const email = usernameToEmail(username);
  const { data, error } = await sb.auth.signUp({ email, password: pw });
  if (error || !data.user) {
    state.authErr = error?.message?.includes('already') ? 'Benutzername bereits vergeben.' : (error?.message || 'Registrierung fehlgeschlagen.');
    render(); return;
  }
  const { error: profErr } = await sb.from('profiles').insert({ id: data.user.id, username });
  if (profErr) {
    state.authErr = 'Benutzername bereits vergeben.';
    await sb.auth.signOut();
    render(); return;
  }
  state.currentUser = { id: data.user.id, username };
  state.profileCache[data.user.id] = username;
  await navigateTo('home');
}

async function doLogin() {
  const username = (document.getElementById('a-name')?.value || '').trim();
  const pw = document.getElementById('a-pw')?.value || '';
  state.authErr = '';

  if (!username) { state.authErr = 'Benutzername eingeben.'; render(); return; }
  if (!pw) { state.authErr = 'Passwort eingeben.'; render(); return; }

  setBtn('auth-btn', true, '');
  const email = usernameToEmail(username);
  const { data, error } = await sb.auth.signInWithPassword({ email, password: pw });
  if (error) {
    state.authErr = 'Benutzername oder Passwort falsch.';
    render(); return;
  }
  const { data: profile } = await sb.from('profiles').select('username').eq('id', data.user.id).single();
  state.currentUser = { id: data.user.id, username: profile?.username || username };
  state.profileCache[data.user.id] = state.currentUser.username;
  await navigateTo('home');
}

async function doLogout() {
  await sb.auth.signOut();
  state.currentUser = null; state.tours = []; state.myTourIds = new Set();
  state.profileCache = {}; state.currentTour = null;
  if (mapInstance) { mapInstance.remove(); mapInstance = null; }
  navigateTo('auth');
}

// ==================== DATA ====================
async function loadHomeData() {
  const [toursRes, membershipsRes] = await Promise.all([
    sb.from('tours').select('*').order('date', { ascending: true }),
    sb.from('tour_members').select('tour_id').eq('user_id', state.currentUser.id)
  ]);
  state.tours = toursRes.data || [];
  const memberIds = (membershipsRes.data || []).map(m => m.tour_id);
  const adminIds2 = state.tours.filter(t => t.admin_id === state.currentUser.id).map(t => t.id);
  state.myTourIds = new Set([...memberIds, ...adminIds2]);

  // Cache admin usernames
  const uncached = [...new Set(state.tours.map(t=>t.admin_id).filter(id => !state.profileCache[id]))];
  if (uncached.length) {
    const { data: profs } = await sb.from('profiles').select('id,username').in('id', uncached);
    (profs||[]).forEach(p => state.profileCache[p.id] = p.username);
  }
}

async function loadTourData(tourId) {
  const [tourRes, membersRes, msgsRes, datesRes] = await Promise.all([
    sb.from('tours').select('*').eq('id', tourId).single(),
    sb.from('tour_members').select('user_id').eq('tour_id', tourId),
    sb.from('messages').select('*').eq('tour_id', tourId).order('created_at', { ascending: true }),
    sb.from('plan_dates').select('*').eq('tour_id', tourId).order('date', { ascending: true })
  ]);
  state.currentTour = tourRes.data;
  state.tourMessages = msgsRes.data || [];
  state.tourPlanDates = datesRes.data || [];

  // Cache member names
  const memIds = (membersRes.data||[]).map(m=>m.user_id);
  const allIds = [...new Set([...(state.currentTour?.admin_id ? [state.currentTour.admin_id] : []), ...memIds].filter(id => !state.profileCache[id]))];
  if (allIds.length) {
    const { data: profs } = await sb.from('profiles').select('id,username').in('id', allIds);
    (profs||[]).forEach(p => state.profileCache[p.id] = p.username);
  }

  const adminId = state.currentTour?.admin_id;
  state.tourMembers = [
    ...(adminId ? [{ user_id: adminId, username: state.profileCache[adminId] || 'Admin', isAdmin: true }] : []),
    ...(membersRes.data||[]).filter(m => m.user_id !== adminId).map(m => ({
      user_id: m.user_id, username: state.profileCache[m.user_id] || 'Unbekannt', isAdmin: false
    }))
  ];
  if (state.currentTour?.date) state.tourCalMonth = new Date(state.currentTour.date + 'T12:00:00');
}

async function loadMessages() {
  const { data } = await sb.from('messages').select('*').eq('tour_id', state.currentTourId).order('created_at', { ascending: true });
  state.tourMessages = data || [];
}

async function createTour(data) {
  const { data: t, error } = await sb.from('tours').insert({ ...data, admin_id: state.currentUser.id }).select().single();
  if (error) throw new Error(error.message);
  return t;
}

async function joinTour(tourId, password) {
  const tour = state.tours.find(t => t.id === tourId);
  if (!tour) throw new Error('Tour nicht gefunden.');
  if (tour.join_password !== password) throw new Error('Falsches Passwort!');
  const { error } = await sb.from('tour_members').insert({ tour_id: tourId, user_id: state.currentUser.id });
  if (error && !error.message.includes('duplicate')) throw new Error(error.message);
  state.myTourIds.add(tourId);
}

async function sendMessage(text) {
  const { data, error } = await sb.from('messages').insert({
    tour_id: state.currentTourId,
    user_id: state.currentUser.id,
    username: state.currentUser.username,
    text
  }).select().single();
  if (error) throw new Error(error.message);
  return data;
}

async function addPlanDate(date, label) {
  const { data, error } = await sb.from('plan_dates').insert({ tour_id: state.currentTourId, date, label }).select().single();
  if (error) throw new Error(error.message);
  state.tourPlanDates.push(data);
}

async function deletePlanDate(id) {
  await sb.from('plan_dates').delete().eq('id', id);
  state.tourPlanDates = state.tourPlanDates.filter(d => d.id !== id);
}

async function updateTourInfo(updates) {
  const { error } = await sb.from('tours').update(updates).eq('id', state.currentTourId);
  if (error) throw new Error(error.message);
  if (state.currentTour) Object.assign(state.currentTour, updates);
}

async function saveGPX(route) {
  const { error } = await sb.from('tours').update({ gpx_route: route }).eq('id', state.currentTourId);
  if (error) throw new Error(error.message);
  if (state.currentTour) state.currentTour.gpx_route = route;
}

async function deleteGPX() {
  const { error } = await sb.from('tours').update({ gpx_route: null }).eq('id', state.currentTourId);
  if (error) throw new Error(error.message);
  if (state.currentTour) state.currentTour.gpx_route = null;
}

// ==================== NAVIGATION ====================
async function navigateTo(view, params = {}) {
  if (mapInstance && view !== 'tour') {
    mapInstance.remove(); mapInstance = null; gpxLayer = null; startMarker = null; endMarker = null;
  }
  Object.assign(state, params);
  try {
    if (view === 'home' && state.currentUser) await loadHomeData();
    if (view === 'tour' && state.currentTourId) await loadTourData(state.currentTourId);
  } catch(e) { console.error(e); }
  state.view = view;
  render();
}

// ==================== RENDER ====================
function render() {
  const app = document.getElementById('app');
  let html = '';
  if (!['auth','loading'].includes(state.view)) html += renderNav();
  switch(state.view) {
    case 'auth':   html += renderAuth(); break;
    case 'home':   html += renderHome(); break;
    case 'create': html += renderCreate(); break;
    case 'join':   html += renderJoin(); break;
    case 'tour':   html += renderTour(); break;
    default: html += '<div class="loading-screen">…</div>';
  }
  app.innerHTML = html;
  attachEvents();
}

function renderCalWidget() {
  const y = state.calMonth.getFullYear(), m = state.calMonth.getMonth();
  const days = daysInMonth(y, m), firstDay = (new Date(y,m,1).getDay()+6)%7;
  const today = new Date();
  const tourDates = new Set();
  state.tours.filter(t => state.myTourIds.has(t.id)).forEach(t => {
    const d = new Date(t.date+'T12:00:00');
    if (d.getFullYear()===y && d.getMonth()===m) tourDates.add(d.getDate());
  });
  const monthName = state.calMonth.toLocaleDateString('de-DE',{month:'long',year:'numeric'});
  const total = Math.ceil((firstDay+days)/7)*7;
  let cells = '';
  for (let i=0; i<total; i++) {
    const dn = i-firstDay+1, inM = dn>=1&&dn<=days;
    const isToday = inM&&today.getDate()===dn&&today.getMonth()===m&&today.getFullYear()===y;
    const hasTour = inM&&tourDates.has(dn);
    let cls = 'cal-day' + (!inM?' other-month':'') + (isToday?' today':'') + (hasTour?' has-tour':'');
    cells += `<div class="${cls}">${inM?dn:''}</div>`;
  }
  return `<div class="calendar-widget">
    <div class="cal-nav">
      <button class="cal-nav-btn" id="cal-prev">‹</button>
      <div class="cal-title">${monthName}</div>
      <button class="cal-nav-btn" id="cal-next">›</button>
    </div>
    <div class="cal-grid">
      ${['Mo','Di','Mi','Do','Fr','Sa','So'].map(d=>`<div class="cal-dow">${d}</div>`).join('')}
      ${cells}
    </div>
    <div class="cal-legend">
      <span><span class="cal-legend-dot" style="background:rgba(240,120,0,0.25)"></span> Tour-Termin</span>
    </div>
  </div>`;
}

            <div class="form-group" style="margin-bottom:10px"><label>Datum</label><input type="date" id="add-date"></div>
            <div class="form-group" style="margin-bottom:10px"><label>Beschriftung (optional)</label><input type="text" id="add-label" placeholder="z.B. Abfahrt, Mittagspause…" maxlength="60"></div>
            <button class="btn btn-ghost btn-sm" id="add-date-btn">+ Termin hinzufügen</button>
          </div>
        ` : ''}
      </div>
    </div>
  </div></div>`;
}

function renderTourCal(tour) {
  const y = state.tourCalMonth.getFullYear(), m = state.tourCalMonth.getMonth();
  const days = daysInMonth(y,m), firstDay = (new Date(y,m,1).getDay()+6)%7;
  const today = new Date();
  const planSet = new Set();
  state.tourPlanDates.forEach(pd => {
    const d = new Date(pd.date+'T12:00:00');
    if (d.getFullYear()===y&&d.getMonth()===m) planSet.add(d.getDate());
  });
  const tourD = new Date(tour.date+'T12:00:00');
  const tourInMonth = tourD.getFullYear()===y&&tourD.getMonth()===m;
  const total = Math.ceil((firstDay+days)/7)*7;
  let cells = '';
  for (let i=0; i<total; i++) {
    const dn=i-firstDay+1, inM=dn>=1&&dn<=days;
    const isToday=inM&&today.getDate()===dn&&today.getMonth()===m&&today.getFullYear()===y;
    const hasPlan=inM&&planSet.has(dn);
    const isTourDay=tourInMonth&&inM&&tourD.getDate()===dn;
    let cls='cal-day'+(!inM?' other-month':'')+(isToday?' today':'')+(hasPlan?' has-tour':'');
    let style=isTourDay?' style="background:var(--accent)!important;color:#000!important;font-weight:700"':'';
    cells += `<div class="${cls}"${style}>${inM?dn:''}</div>`;
  }
  const monthName = state.tourCalMonth.toLocaleDateString('de-DE',{month:'long',year:'numeric'});
  return `<div class="calendar-widget" style="background:var(--surface2)">
    <div class="cal-nav">
      <button class="cal-nav-btn" id="tcal-prev">‹</button>
      <div class="cal-title" style="font-size:18px">${monthName}</div>
      <button class="cal-nav-btn" id="tcal-next">›</button>
    </div>
    <div class="cal-grid">
      ${['Mo','Di','Mi','Do','Fr','Sa','So'].map(d=>`<div class="cal-dow">${d}</div>`).join('')}${cells}
    </div>
    <div class="cal-legend">
      <span><span class="cal-legend-dot" style="background:var(--accent)"></span> Startdatum</span>
      <span><span class="cal-legend-dot" style="background:rgba(240,120,0,0.25)"></span> Planungstermin</span>
    </div>
  </div>`;
}

// ==================== GPX ====================
function parseGPX(xml) {
  const doc = new DOMParser().parseFromString(xml,'text/xml');
  let pts = Array.from(doc.querySelectorAll('trkpt'));
  if (!pts.length) pts = Array.from(doc.querySelectorAll('rtept'));
  if (!pts.length) pts = Array.from(doc.querySelectorAll('wpt'));
  return pts.map(p=>[parseFloat(p.getAttribute('lat')),parseFloat(p.getAttribute('lon'))]).filter(([a,b])=>!isNaN(a)&&!isNaN(b));
}
function buildGPX(tour) {
  const pts = (tour.gpx_route||[]).map(([lat,lon])=>`      <trkpt lat="${lat}" lon="${lon}"></trkpt>`).join('\n');
  return `<?xml version="1.0" encoding="UTF-8"?>
<gpx version="1.1" creator="MotoRoute" xmlns="http://www.topografix.com/GPX/1/1">
  <metadata><name>${esc(tour.name)}</name></metadata>
  <trk><name>${esc(tour.name)}</name><trkseg>\n${pts}\n  </trkseg></trk>
</gpx>`;
}
function downloadGPX(tour) {
  const blob = new Blob([buildGPX(tour)],{type:'application/gpx+xml'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `${tour.name.replace(/\s+/g,'_')}.gpx`;
  a.click(); setTimeout(()=>URL.revokeObjectURL(a.href),5000);
}

// ==================== MAP ====================
function initMap(tour) {
  const container = document.getElementById('map');
  if (!container) return;
  if (mapInstance) { mapInstance.invalidateSize(); return; }
  mapInstance = L.map('map',{center:[48.2,9.5],zoom:7,zoomControl:true});
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
    attribution:'© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',maxZoom:19
  }).addTo(mapInstance);
  if (tour.gpx_route && tour.gpx_route.length > 0) drawRoute(tour.gpx_route);
}

function drawRoute(points) {
  if (!mapInstance) return;
  if (gpxLayer) { mapInstance.removeLayer(gpxLayer); gpxLayer=null; }
  if (startMarker) { mapInstance.removeLayer(startMarker); startMarker=null; }
  if (endMarker) { mapInstance.removeLayer(endMarker); endMarker=null; }
  if (!points||!points.length) return;
  gpxLayer = L.polyline(points,{color:'#f07800',weight:4.5,opacity:.95,lineJoin:'round'}).addTo(mapInstance);
  const mkIcon = (color) => L.divIcon({className:'',iconSize:[14,14],iconAnchor:[7,7],
    html:`<div style="background:${color};width:14px;height:14px;border-radius:50%;border:2px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,0.5)"></div>`});
  startMarker = L.marker(points[0],{icon:mkIcon('#3dba7b')}).addTo(mapInstance).bindPopup('<strong>Start</strong>');
  endMarker = L.marker(points[points.length-1],{icon:mkIcon('#f07800')}).addTo(mapInstance).bindPopup('<strong>Ziel</strong>');
  mapInstance.fitBounds(gpxLayer.getBounds(),{padding:[40,40]});
}

// ==================== EVENTS ====================
function attachEvents() {
  // Auth
  const authSwitch = document.getElementById('auth-switch');
  if (authSwitch) authSwitch.addEventListener('click', () => { state.authMode = state.authMode==='login'?'register':'login'; state.authErr=''; render(); });
  const authBtn = document.getElementById('auth-btn');
  if (authBtn) {
    authBtn.addEventListener('click', () => { if (state.authMode==='login') doLogin(); else doRegister(); });
    document.getElementById('a-pw')?.addEventListener('keydown', e => { if(e.key==='Enter') authBtn.click(); });
    document.getElementById('a-pw2')?.addEventListener('keydown', e => { if(e.key==='Enter') authBtn.click(); });
    setTimeout(()=>document.getElementById('a-name')?.focus(), 50);
  }

  // Nav
  document.getElementById('nav-logo')?.addEventListener('click', () => navigateTo('home'));
  document.getElementById('logout-btn')?.addEventListener('click', doLogout);

  // Back
  document.querySelectorAll('#back-home').forEach(el => el.addEventListener('click', () => navigateTo('home')));

  // Home
  document.getElementById('go-create')?.addEventListener('click', () => navigateTo('create'));
  document.getElementById('go-join')?.addEventListener('click', () => navigateTo('join'));
  document.querySelectorAll('[data-open-id]').forEach(el => el.addEventListener('click', e => { e.stopPropagation(); navigateTo('tour',{currentTourId:el.dataset.openId,currentTab:'map'}); }));
  document.querySelectorAll('[data-join-id]').forEach(el => el.addEventListener('click', e => { e.stopPropagation(); state.preJoinId=el.dataset.joinId; navigateTo('join'); }));
  document.querySelectorAll('.tour-card').forEach(card => card.addEventListener('click', e => {
    if (e.target.closest('[data-open-id]')||e.target.closest('[data-join-id]')) return;
    const id=card.dataset.tourId;
    if (state.myTourIds.has(id)) navigateTo('tour',{currentTourId:id,currentTab:'map'});
  }));

  // Calendar nav
  document.getElementById('cal-prev')?.addEventListener('click', () => { state.calMonth=new Date(state.calMonth.getFullYear(),state.calMonth.getMonth()-1,1); render(); });
  document.getElementById('cal-next')?.addEventListener('click', () => { state.calMonth=new Date(state.calMonth.getFullYear(),state.calMonth.getMonth()+1,1); render(); });

  // Create form
  document.getElementById('create-submit')?.addEventListener('click', async () => {
    const name=(document.getElementById('f-name')?.value||'').trim();
    const desc=(document.getElementById('f-desc')?.value||'').trim();
    const date=document.getElementById('f-date')?.value;
    const edate=document.getElementById('f-edate')?.value;
    const dest=(document.getElementById('f-dest')?.value||'').trim();
    const dist=(document.getElementById('f-dist')?.value||'').trim();
    const pw=document.getElementById('f-pw')?.value;
    if (!name) { toast('Tour-Name ist Pflichtfeld.','error'); return; }
    if (!date) { toast('Startdatum ist Pflichtfeld.','error'); return; }
    if (!pw||pw.length<3) { toast('Passwort muss mindestens 3 Zeichen haben.','error'); return; }
    setBtn('create-submit',true,'');
    try {
      const t = await createTour({name,description:desc,date,end_date:edate||null,destination:dest,distance:dist,join_password:pw});
      state.myTourIds.add(t.id);
      toast('✓ Tour erstellt!');
      await navigateTo('tour',{currentTourId:t.id,currentTab:'map'});
    } catch(e) { toast(e.message,'error'); setBtn('create-submit',false,'Tour anlegen →'); }
  });

  // Join form
  document.getElementById('join-submit')?.addEventListener('click', async () => {
    const id=document.getElementById('join-sel')?.value;
    const pw=document.getElementById('join-pw')?.value;
    if (!id) { toast('Bitte eine Tour auswählen.','error'); return; }
    setBtn('join-submit',true,'');
    try {
      await joinTour(id,pw);
      toast('✓ Willkommen in der Tour! 🏍️');
      await navigateTo('tour',{currentTourId:id,currentTab:'map'});
    } catch(e) { toast(e.message,'error'); setBtn('join-submit',false,'Beitreten →'); }
  });

  // Tour tabs
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', async () => {
      state.currentTab = btn.dataset.tab;
      if (state.currentTab==='chat') await loadMessages();
      document.querySelectorAll('.tab-btn').forEach(b=>b.classList.toggle('active',b.dataset.tab===state.currentTab));
      const tc=document.getElementById('tab-content');
      if (tc&&state.currentTour) {
        tc.innerHTML = renderTab(state.currentTour);
        afterTabRender();
      }
    });
  });

  if (state.view==='tour') afterTabRender();
}

function afterTabRender() {
  if (state.currentTab==='map') {
    setTimeout(()=>{ initMap(state.currentTour); attachMapEvents(); }, 80);
  }
  if (state.currentTab==='chat') {
    setTimeout(()=>{ const m=document.getElementById('chat-msgs'); if(m) m.scrollTop=m.scrollHeight; },50);
    attachChatEvents();
  }
  if (state.currentTab==='info') attachInfoEvents();
}

function attachMapEvents() {
  document.getElementById('gpx-up')?.addEventListener('change', async e => {
    const file=e.target.files[0]; if (!file) return;
    const text=await file.text();
    const route=parseGPX(text);
    if (!route.length) { toast('Keine Route in GPX-Datei gefunden.','error'); return; }
    try {
      await saveGPX(route);
      toast(`✓ Route gespeichert (${route.length} Punkte)`);
      drawRoute(route);
      const tc=document.getElementById('tab-content');
      if(tc){tc.innerHTML=renderTab(state.currentTour);setTimeout(()=>{initMap(state.currentTour);attachMapEvents();},80);}
    } catch(e) { toast(e.message,'error'); }
  });
  document.getElementById('gpx-dl')?.addEventListener('click', () => downloadGPX(state.currentTour));
  document.getElementById('gpx-del')?.addEventListener('click', async () => {
    try {
      await deleteGPX();
      if(gpxLayer){mapInstance.removeLayer(gpxLayer);gpxLayer=null;}
      if(startMarker){mapInstance.removeLayer(startMarker);startMarker=null;}
      if(endMarker){mapInstance.removeLayer(endMarker);endMarker=null;}
      toast('Route gelöscht');
      const tc=document.getElementById('tab-content');
      if(tc){tc.innerHTML=renderTab(state.currentTour);setTimeout(()=>{initMap(state.currentTour);attachMapEvents();},80);}
    } catch(e) { toast(e.message,'error'); }
  });
}

function attachChatEvents() {
  const doSend = async () => {
    const input=document.getElementById('chat-in');
    const text=(input?.value||'').trim(); if(!text) return;
    input.value='';
    try {
      const msg=await sendMessage(text);
      state.tourMessages.push(msg);
      const tc=document.getElementById('tab-content');
      if(tc){tc.innerHTML=renderTab(state.currentTour);attachChatEvents();setTimeout(()=>{const m=document.getElementById('chat-msgs');if(m)m.scrollTop=m.scrollHeight;},30);}
    } catch(e) { toast(e.message,'error'); input.value=text; }
  };
  document.getElementById('chat-send')?.addEventListener('click', doSend);
  document.getElementById('chat-in')?.addEventListener('keydown', e=>{ if(e.key==='Enter') doSend(); });
}

function attachInfoEvents() {
  document.getElementById('edit-save')?.addEventListener('click', async () => {
    const updates = {
      destination: (document.getElementById('edit-dest')?.value||'').trim(),
      distance: (document.getElementById('edit-dist')?.value||'').trim(),
      description: (document.getElementById('edit-desc')?.value||'').trim()
    };
    try {
      await updateTourInfo(updates);
      toast('✓ Gespeichert');
      document.getElementById('hdr-dest')?.textContent && (document.getElementById('hdr-dest').textContent='📍 '+(updates.destination||'Kein Ziel'));
      document.getElementById('hdr-dist')?.textContent && (document.getElementById('hdr-dist').textContent='📏 '+(updates.distance||'—'));
      document.getElementById('info-dest')?.textContent && (document.getElementById('info-dest').textContent=updates.destination||'—');
      document.getElementById('info-dist')?.textContent && (document.getElementById('info-dist').textContent=updates.distance||'—');
    } catch(e) { toast(e.message,'error'); }
  });

  document.getElementById('tcal-prev')?.addEventListener('click', () => {
    state.tourCalMonth=new Date(state.tourCalMonth.getFullYear(),state.tourCalMonth.getMonth()-1,1);
    const tc=document.getElementById('tab-content'); if(tc){tc.innerHTML=renderTab(state.currentTour);attachInfoEvents();}
  });
  document.getElementById('tcal-next')?.addEventListener('click', () => {
    state.tourCalMonth=new Date(state.tourCalMonth.getFullYear(),state.tourCalMonth.getMonth()+1,1);
    const tc=document.getElementById('tab-content'); if(tc){tc.innerHTML=renderTab(state.currentTour);attachInfoEvents();}
  });

  document.getElementById('add-date-btn')?.addEventListener('click', async () => {
    const d=document.getElementById('add-date')?.value;
    const l=(document.getElementById('add-label')?.value||'').trim();
    if (!d) { toast('Bitte Datum wählen.','error'); return; }
    try {
      await addPlanDate(d,l);
      const tc=document.getElementById('tab-content'); if(tc){tc.innerHTML=renderTab(state.currentTour);attachInfoEvents();}
    } catch(e) { toast(e.message,'error'); }
  });

  document.querySelectorAll('[data-del-date]').forEach(btn => {
    btn.addEventListener('click', async () => {
      try {
        await deletePlanDate(btn.dataset.delDate);
        const tc=document.getElementById('tab-content'); if(tc){tc.innerHTML=renderTab(state.currentTour);attachInfoEvents();}
      } catch(e) { toast(e.message,'error'); }
    });
  });
}

// ==================== INIT ====================
async function init() {
  try {
    const { data: { session } } = await sb.auth.getSession();
    if (session) {
      const { data: profile } = await sb.from('profiles').select('username').eq('id', session.user.id).single();
      if (profile) {
        state.currentUser = { id: session.user.id, username: profile.username };
        state.profileCache[session.user.id] = profile.username;
        await navigateTo('home');
        return;
      }
    }
  } catch(e) { console.error(e); }
  state.authMode = 'login';
  state.view = 'auth';
  render();
}

init();
</script>
